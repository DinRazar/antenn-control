<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antenna Control UI</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel2: #1f2937;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --ok: #22c55e;
      --bad: #ef4444;
      --info: #38bdf8;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1550px; margin: 0 auto; padding: 18px; }
    h1, h2, h3 { margin: 0 0 12px; }
    .top { display: grid; grid-template-columns: 380px 1fr; gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .row3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input, select, textarea {
      width: 100%; background: var(--panel2); color: var(--text); border: 1px solid var(--line);
      border-radius: 10px; padding: 10px 12px;
    }
    textarea { min-height: 88px; resize: vertical; }
    button { border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; color: white; background: #475569; }
    .primary { background: var(--ok); color: #052e16; }
    .danger { background: var(--bad); }
    .info { background: var(--info); color: #082f49; }
    .warn { background: var(--warn); color: #451a03; }
    .section { margin-top: 16px; }
    .pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .pill { background: var(--panel2); border: 1px solid var(--line); color: var(--muted); border-radius: 999px; padding: 8px 10px; font-size: 13px; }
    .pill.ok { color: #86efac; }
    .pill.bad { color: #fca5a5; }
    .main { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 16px; }
    .show-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .field { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
    .field .k { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .field .v { font-size: 18px; font-weight: 700; line-height: 1.2; word-break: break-word; }
    .field .sub { color: #cbd5e1; font-size: 12px; margin-top: 6px; }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    ul { margin: 0; padding-left: 18px; }
    pre {
      margin: 0; background: #020617; border: 1px solid var(--line); border-radius: 12px; padding: 12px;
      white-space: pre-wrap; word-break: break-word; overflow: auto; min-height: 140px; color: #cbd5e1;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    @media (max-width: 1300px) {
      .top { grid-template-columns: 1fr; }
      .show-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .show-grid, .two, .row, .row3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Antenna Control UI</h1>
  <div class="pills">
    <div class="pill" id="connState">Не подключено</div>
    <div class="pill" id="pollState">Опрос: выключен</div>
    <div class="pill" id="lastShowAt">Последний show: —</div>
    <div class="pill" id="lastStatus">Статус антенны: —</div>
    <div class="pill" id="lastGps">GPS: —</div>
  </div>

  <div class="top">
    <div>
      <div class="card">
        <h2>Подключение</h2>
        <div class="row">
          <div>
            <label>Режим</label>
            <select id="mode">
              <option value="tcp">TCP</option>
              <option value="serial">Serial</option>
            </select>
          </div>
          <div>
            <label>Интервал опроса, сек</label>
            <input id="pollInterval" type="number" step="0.1" value="1.0" />
          </div>
        </div>
        <div class="row">
          <div><label>Host</label><input id="host" value="192.168.1.1" /></div>
          <div><label>Port</label><input id="port" type="number" value="8899" /></div>
        </div>
        <div class="row">
          <div><label>Serial device</label><input id="serialDev" value="/dev/ttyUSB0" /></div>
          <div><label>Baud</label><input id="baud" type="number" value="38400" /></div>
        </div>
        <div class="actions">
          <button class="primary" onclick="connectAntenna()">Подключить</button>
          <button class="danger" onclick="disconnectAntenna()">Отключить</button>
        </div>
      </div>

      <div class="card section">
        <h2>Команды</h2>
        <div class="actions">
          <button class="info" onclick="sendSimple('cmd,get show,')">Query state</button>
          <button class="warn" onclick="sendSimple('cmd,stop,')">Stop</button>
          <button onclick="sendSimple('cmd,reset,')">Reset</button>
          <button onclick="sendSimple('cmd,search,')">Search/Aiming</button>
          <button onclick="sendSimple('cmd,stow,')">Stow</button>
          <button onclick="sendSimple('cmd,get sat,')">Get sat</button>
          <button onclick="sendSimple('cmd,get place,')">Get place</button>
          <button onclick="sendSimple('cmd,get rec type,')">Get rec type</button>
          <button onclick="sendSimple('cmd,get beacon,')">Get beacon</button>
          <button onclick="sendSimple('cmd,get dvb,')">Get dvb</button>
        </div>
      </div>

      <div class="card section">
        <h2>Ручное управление</h2>
        <div class="row">
          <div><label>Adjusting (1..6)</label><input id="manualAdj" value="1" /></div>
          <div><label>Speed (0.00..6.00)</label><input id="manualSpeed" value="3.00" /></div>
        </div>
        <div class="actions" style="margin-bottom:10px">
          <button onclick="sendManualSpeed()">Manual speed mode</button>
        </div>
        <div class="row3">
          <div><label>Azimuth</label><input id="dirAz" value="180.00" /></div>
          <div><label>Elevation</label><input id="dirEl" value="21.50" /></div>
          <div><label>Polarization</label><input id="dirPol" value="-90.00" /></div>
        </div>
        <div class="actions"><button onclick="sendDir()">Manual position mode</button></div>
      </div>

      <div class="card section">
        <h2>Raw</h2>
        <label>Payload без $ и *hh</label>
        <textarea id="rawPayload">cmd,get show,</textarea>
        <div class="actions" style="margin:10px 0 12px"><button onclick="sendRawPayload()">Send payload</button></div>
        <label>Полный frame c $ и *hh</label>
        <textarea id="rawFrame"></textarea>
        <div class="actions" style="margin-top:10px"><button onclick="sendRawFrame()">Send frame</button></div>
      </div>
    </div>

    <div>
      <div class="card">
        <h2>Полный разбор show</h2>
        <div class="show-grid" id="showGrid"></div>
      </div>

      <div class="two section">
        <div class="card">
          <h2>Limit decoded</h2>
          <ul id="limitList"></ul>
        </div>
        <div class="card">
          <h2>Warning decoded</h2>
          <ul id="warningList"></ul>
        </div>
      </div>

      <div class="two section">
        <div class="card">
          <h2>Последний show frame</h2>
          <pre class="mono" id="rawShowFrame">—</pre>
        </div>
        <div class="card">
          <h2>Человекочитаемый show</h2>
          <pre class="mono" id="prettyShow">—</pre>
        </div>
      </div>

      <div class="card section">
        <h2>Лог</h2>
        <pre class="mono" id="logBox">—</pre>
      </div>
    </div>
  </div>
</div>

<script>
const showFields = [
  ['preset_azimuth', 'Preset azimuth', 'deg'],
  ['preset_elevation', 'Preset elevation', 'deg'],
  ['preset_polarization', 'Preset polarization', 'deg'],
  ['current_azimuth', 'Current azimuth', 'deg'],
  ['current_elevation', 'Current elevation', 'deg'],
  ['current_polarization', 'Current polarization', 'deg'],
  ['antenna_status_code', 'Antenna status code', 'raw'],
  ['antenna_status_text', 'Antenna status text', 'decoded'],
  ['carrier_heading_angle', 'Carrier heading angle', 'deg'],
  ['carrier_elevation', 'Carrier elevation', 'deg'],
  ['carrier_roll_angle', 'Carrier roll angle', 'deg'],
  ['longitude', 'Longitude', 'deg'],
  ['latitude', 'Latitude', 'deg'],
  ['gps_status_code', 'GPS status code', 'raw'],
  ['gps_status_text', 'GPS status text', 'decoded'],
  ['limit_information', 'Limit information', 'raw'],
  ['agc_electrical_level', 'AGC electrical level', 'V'],
  ['warning_information', 'Warning information', 'raw'],
  ['time', 'Time', 'device'],
];

function esc(s) {
  return String(s ?? '').replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function api(path, options = {}) {
  const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...options });
  const data = await res.json();
  if (!res.ok || data.ok === false) throw new Error(data.error || 'request failed');
  return data;
}

function setList(id, arr) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  if (!arr || !arr.length) {
    el.innerHTML = '<li>—</li>';
    return;
  }
  arr.forEach(v => {
    const li = document.createElement('li');
    li.textContent = v;
    el.appendChild(li);
  });
}

async function connectAntenna() {
  try {
    await api('/api/connect', {
      method: 'POST',
      body: JSON.stringify({
        mode: document.getElementById('mode').value,
        host: document.getElementById('host').value,
        port: Number(document.getElementById('port').value),
        serial_dev: document.getElementById('serialDev').value,
        baud: Number(document.getElementById('baud').value),
        poll_interval: Number(document.getElementById('pollInterval').value),
      })
    });
    await refreshState();
  } catch (e) {
    appendClientLog('Ошибка подключения: ' + e.message);
  }
}

async function disconnectAntenna() {
  try {
    await api('/api/disconnect', { method: 'POST', body: '{}' });
    await refreshState();
  } catch (e) {
    appendClientLog('Ошибка отключения: ' + e.message);
  }
}

async function sendSimple(payload) {
  try {
    const data = await api('/api/send_payload', { method: 'POST', body: JSON.stringify({ payload }) });
    appendClientLog('TX: ' + data.frame);
    await refreshState();
  } catch (e) {
    appendClientLog('Ошибка отправки: ' + e.message);
  }
}

async function sendManualSpeed() {
  const payload = `cmd,manual,${document.getElementById('manualAdj').value},${document.getElementById('manualSpeed').value},`;
  await sendSimple(payload);
}

async function sendDir() {
  const payload = `cmd,dir,${document.getElementById('dirAz').value},${document.getElementById('dirEl').value},${document.getElementById('dirPol').value},`;
  await sendSimple(payload);
}

async function sendRawPayload() { await sendSimple(document.getElementById('rawPayload').value.trim()); }

async function sendRawFrame() {
  try {
    const data = await api('/api/send_frame', { method: 'POST', body: JSON.stringify({ frame: document.getElementById('rawFrame').value }) });
    appendClientLog('TX raw: ' + data.frame);
    await refreshState();
  } catch (e) {
    appendClientLog('Ошибка raw frame: ' + e.message);
  }
}

function appendClientLog(msg) {
  const box = document.getElementById('logBox');
  const ts = new Date().toLocaleTimeString();
  const old = box.textContent === '—' ? '' : box.textContent + '\n';
  box.textContent = (old + `[${ts}] ${msg}`).split('\n').slice(-120).join('\n');
}

function renderShow(show) {
  const grid = document.getElementById('showGrid');
  grid.innerHTML = showFields.map(([key, label, hint]) => `
    <div class="field">
      <div class="k">${esc(label)}</div>
      <div class="v">${esc(show?.[key] ?? '—')}</div>
      <div class="sub">${esc(hint)}</div>
    </div>
  `).join('');
  setList('limitList', show?.limit_decoded || []);
  setList('warningList', show?.warning_decoded || []);
  document.getElementById('rawShowFrame').textContent = show?.raw_frame || '—';
}

async function refreshState() {
  try {
    const data = await api('/api/state');
    const s = data.state || {};
    const show = s.show || {};

    const conn = document.getElementById('connState');
    conn.textContent = s.connected ? `Подключено (${s.mode})` : 'Не подключено';
    conn.className = 'pill ' + (s.connected ? 'ok' : 'bad');

    document.getElementById('pollState').textContent = s.polling ? `Опрос: включен (${s.poll_interval} сек)` : 'Опрос: выключен';
    document.getElementById('lastShowAt').textContent = 'Последний show: ' + (s.last_show_at || '—');
    document.getElementById('lastStatus').textContent = 'Статус антенны: ' + (show.antenna_status_text || '—');
    document.getElementById('lastGps').textContent = 'GPS: ' + (show.gps_status_text || '—');

    renderShow(show);
    document.getElementById('prettyShow').textContent = s.last_show_pretty || '—';
    document.getElementById('logBox').textContent = (s.log && s.log.length) ? s.log.join('\n') : document.getElementById('logBox').textContent;
  } catch (e) {
    appendClientLog('Ошибка обновления: ' + e.message);
  }
}

refreshState();
setInterval(refreshState, 1000);
</script>
</body>
</html>
