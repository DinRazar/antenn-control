<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antenna Control</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
<div class="container">
    <h1>Управление антенной</h1>

    <!-- Телеметрия сверху -->
    <div class="telemetry-panel">
        <div class="telemetry-grid">
            <div class="telemetry-item">
                <div class="label">Азимут</div>
                <div class="value" id="cur_az">--°</div>
                <div class="target">Цель: <span id="tar_az">--</span>°</div>
            </div>
            <div class="telemetry-item">
                <div class="label">Угол места</div>
                <div class="value" id="cur_el">--°</div>
                <div class="target">Цель: <span id="tar_el">--</span>°</div>
            </div>
            <div class="telemetry-item">
                <div class="label">Поляризация</div>
                <div class="value" id="cur_pol">--°</div>
                <div class="target">Цель: <span id="tar_pol">--</span>°</div>
            </div>
            <div class="telemetry-item">
                <div class="label">Уровень сигнала</div>
                <div class="value" id="agc">-- В</div>
                <div class="target">Порог: 3 В</div>
            </div>
            <div class="telemetry-item status-item">
                <div class="label">Статус</div>
                <div class="value status-text" id="status">--</div>
                <div class="target" id="status_code">Код: --</div>
            </div>
            <div class="telemetry-item">
                <div class="label">GPS</div>
                <div class="value" id="gps">--</div>
                <div class="target"><span id="lon">--</span>° <span id="lat">--</span>°</div>
            </div>
        </div>
    </div>

    <!-- Управление спутниками -->
    <div class="satellite-panel">
        <div class="satellite-header">
            <h2>Спутники</h2>
            <button onclick="showAddSatellite()" class="btn-add">+ Добавить</button>
        </div>
        
        <div class="satellite-controls">
            <div class="satellite-select">
                <label>Выберите спутник</label>
                <select id="satelliteSelect" onchange="selectSatellite()">
                    <option value="">-- Выберите --</option>
                </select>
            </div>
            <div class="satellite-info" id="satelliteInfo">
                <div class="info-item">
                    <span class="info-label">Позиция</span>
                    <span class="info-value" id="satPos">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Частота</span>
                    <span class="info-value" id="satFreq">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Поляризация</span>
                    <span class="info-value" id="satPol">--</span>
                </div>
            </div>
            <button onclick="pointToSatellite()" class="btn-point">Применить</button>
        </div>
        
        <!-- Модальное окно добавления спутника -->
        <div id="satModal" class="modal">
            <div class="modal-content">
                <span class="modal-close" onclick="closeModal()">&times;</span>
                <h3>Добавить спутник</h3>
                <div class="modal-fields">
                    <div class="field-group">
                        <label>Название</label>
                        <input type="text" id="satName" placeholder="Напр. AsiaSat 7">
                    </div>
                    <div class="field-group">
                        <label>Позиция (градусы)</label>
                        <input type="number" step="0.1" id="satPosition" placeholder="110.5">
                        <span class="hint">Восток +, Запад -</span>
                    </div>
                    <div class="field-group">
                        <label>Частота (МГц)</label>
                        <input type="number" step="0.01" id="satFrequency" placeholder="12260.00">
                        <!-- <span class="hint">12200-12900 МГц</span> -->
                    </div>
                    <div class="field-group">
                        <label>Поляризация</label>
                        <select id="satPolarization">
                            <option value="0">Горизонтальная</option>
                            <option value="1" selected>Вертикальная</option>
                        </select>
                    </div>
                </div>
                <button onclick="saveSatellite()" class="btn-save">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Визуализация антенны снизу -->
    <div class="visualization-panel">
        <div class="viz-container">
            <div class="viz-box">
                <div class="viz-label">Азимут</div>
                <canvas id="azimuthCanvas" width="280" height="280"></canvas>
                <div class="viz-value" id="azimuthValue">0°</div>
            </div>
            <div class="viz-box">
                <div class="viz-label">Угол места</div>
                <canvas id="elevationCanvas" width="280" height="280"></canvas>
                <div class="viz-value" id="elevationValue">0°</div>
            </div>
        </div>
    </div>

    <!-- Управление -->
    <div class="control-panel">
        <div class="button-group">
            <button onclick="sendCommand('cmd,stop,')" class="btn-stop">Стоп</button>
            <button onclick="sendCommand('cmd,reset,')" class="btn-reset">Развернуть</button>
            <button onclick="sendCommand('cmd,search,')" class="btn-search">Поиск</button>
            <button onclick="sendCommand('cmd,stow,')" class="btn-stow">Сложить</button>
        </div>
        <div class="button-group">
            <button onclick="manualSpeed()" class="btn-manual">Скорость</button>
            <button onclick="manualPosition()" class="btn-manual">Позиция</button>
        </div>
        <div class="input-group">
            <label>Аз:</label>
            <input type="number" step="0.01" id="az" placeholder="0.00">
            <label>Мес:</label>
            <input type="number" step="0.01" id="el" placeholder="0.00">
            <label>Пол:</label>
            <input type="number" step="0.01" id="pol" placeholder="0.00">
            <button onclick="setPosition()" class="btn-set">Установить</button>
        </div>
        <!-- <div class="input-group">
            <label>Скорость:</label>
            <input type="number" step="0.1" id="speed" value="3.0">
            <label>Напр:</label>
            <input type="number" id="adj" value="1">
            <button onclick="setSpeed()" class="btn-set">Уст</button>
        </div> -->
        <div id="cmdStatus" class="status-msg"></div>
    </div>
</div>
</body>
</html>
